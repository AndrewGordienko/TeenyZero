<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>TeenyZero | Play</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='common/common.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='gameplay/play.css') }}">
</head>
<body>
<main class="shell">
    <header class="page-hero">
        <div class="hero-copy">
            <div class="eyebrow">TeenyZero</div>
            <h1>Play Current Network</h1>
            <p class="subtitle">Interactive engine board backed by the latest loaded model.</p>
        </div>
        <a class="home-link" href="/">Back to Hub</a>
    </header>

    <section class="play-layout">
        <div class="board-panel">
            <div id="board"></div>
        </div>
        <aside class="panel side-panel">
            <h2 class="section-title">Engine Play</h2>

            <div class="control-group">
                <label class="metric-label" for="user-side">Environment Setup</label>
                <select id="user-side">
                    <option value="w">Play as White</option>
                    <option value="b">Play as Black</option>
                </select>
            </div>

            <div class="control-group">
                <div class="metric-label">Inference Metrics</div>
                <div class="stats-list">
                    <div class="stats-row">Win Probability <span id="win-prob">50.0%</span></div>
                    <div class="stats-row">System Status <span id="status">Ready</span></div>
                </div>
            </div>

            <button id="reset-button" class="action-button" type="button">Reset Environment</button>
        </aside>
    </section>
</main>

<script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.js"></script>
<script src="{{ url_for('static', filename='gameplay/play.js') }}"></script>
</body>
</html>

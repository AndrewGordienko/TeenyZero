<!DOCTYPE html>
<html>
<head>
    <title>teenyzero | research lab</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.css">
    <style>
        body { 
            background: #ffffff; 
            color: #312e2b; 
            font-family: -apple-system, system-ui, sans-serif; 
            display: flex; 
            justify-content: center; 
            padding-top: 50px; 
            margin: 0;
        }
        .container { display: flex; gap: 40px; align-items: flex-start; }
        #board { 
            width: 480px; 
            filter: drop-shadow(0 8px 24px rgba(0,0,0,0.12)); 
        }
        .info { 
            width: 280px; 
            background: #f8f9fa; 
            padding: 24px; 
            border-radius: 12px; 
            border: 1px solid #eee; 
            box-shadow: 0 2px 8px rgba(0,0,0,0.02);
        }
        h3 { 
            color: #1a1a1a; 
            margin-top: 0; 
            font-size: 14px; 
            text-transform: uppercase; 
            letter-spacing: 1.5px; 
            border-bottom: 2px solid #eee; 
            padding-bottom: 12px; 
            margin-bottom: 20px;
        }
        .stat { margin: 18px 0; font-size: 13px; color: #666; overflow: hidden; }
        .val { color: #1a1a1a; font-weight: 700; float: right; }
        
        select, button { 
            width: 100%; 
            padding: 12px; 
            margin-top: 8px; 
            border-radius: 8px; 
            border: 1px solid #ddd; 
            font-size: 13px; 
            background: white;
            outline: none;
        }
        button { 
            background: #312e2b; 
            color: white; 
            font-weight: 600; 
            border: none; 
            margin-top: 24px; 
            transition: all 0.2s ease;
        }
        button:hover { 
            background: #000;
            transform: translateY(-1px);
        }
        .label-small { 
            font-size: 10px; 
            font-weight: 700; 
            color: #aaa; 
            text-transform: uppercase; 
            letter-spacing: 0.5px;
        }
        .section-spacer { margin-top: 32px; }
    </style>
</head>
<body>

<div class="container">
    <div id="board"></div>
    
    <div class="info">
        <h3>TeenyZero Lab</h3>
        
        <div class="label-small">Environment Setup</div>
        <select id="user-side" onchange="resetGame()">
            <option value="w">Play as White</option>
            <option value="b">Play as Black</option>
        </select>

        <div class="label-small section-spacer">MCTS Inference Metrics</div>
        <div class="stat">Win Probability <span id="win-prob" class="val">50.0%</span></div>
        <div class="stat">System Status <span id="status" class="val">Ready</span></div>
        
        <button onclick="resetGame()">Reset Environment</button>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.js"></script>

<script>
    var board = null;
    
    function onDrop(source, target) {
        if (source === target) return;

        let uci = source + target;
        $("#status").text("Computing...");

        $.ajax({
            url: "/move",
            type: "POST",
            contentType: "application/json",
            data: JSON.stringify({ uci: uci }),
            success: function(data) {
                console.log("Engine Response:", data);
                board.position(data.fen);
                if (data.win_prob !== undefined) {
                    $("#win-prob").text(data.win_prob.toFixed(1) + "%");
                }
                $("#status").text("Your Move");
            },
            error: function(err) {
                console.error("Move Error:", err);
                board.position(board.fen());
                $("#status").text("Illegal Move");
            }
        });
    }

    function resetGame() {
        const side = $("#user-side").val();
        $("#status").text("Resetting...");

        $.ajax({
            url: "/reset",
            type: "POST",
            contentType: "application/json",
            data: JSON.stringify({ side: side }),
            success: function(data) {
                console.log("Environment Reset:", data);
                board.orientation(side === 'w' ? 'white' : 'black');
                board.position(data.fen);
                $("#win-prob").text("50.0%");
                $("#status").text(side === 'w' ? "Your Move" : "Engine Thinking...");
            },
            error: function(err) {
                console.error("Reset Error:", err);
            }
        });
    }

    var config = {
        draggable: true,
        position: 'start',
        onDrop: onDrop,
        // Ensure pieces are in /static/pieces/ with names like wP.png, bN.png
        pieceTheme: '/static/pieces/{piece}.png'
    };

    board = ChessBoard('board', config);
</script>
</body>
</html>
